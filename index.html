<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blake's Travel Map</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<!-- MarkerCluster CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<!-- Your styles -->
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<header class="app-header">
  <div class="header-left">
    <div class="logo">🌍</div>
    <div>
      <h1>Blake’s Travel Map</h1>
      <p>Tracking my travels across the USA</p>
    </div>
  </div>

  <div class="header-center">
    <div class="header-stat">
      <span id="statesVisited">0</span>
      <label>States</label>
    </div>
    <div class="header-stat">
      <span id="citiesVisited">0</span>
      <label>Cities</label>
    </div>
    <div class="header-stat">
      <span id="countriesVisited">0</span>
      <label>Countries</label>
    </div>
    <div class="header-stat">
      <span id="territoriesVisited">0</span>
      <label>Territories</label>
    </div>
    <div class="header-stat">
      <span id="sportsVisited">0</span>
      <label>Sports</label>
    </div>
  </div>

  <div class="header-right">
    <img src="images/profile.jpg" alt="Blake Whitman">
  </div>
</header>

<!-- Map container -->
<div id="map"></div>

<div id="control-panel-wrapper">
  <div id="control-panel">

    <button id="panel-toggle">☰</button>

    <!-- Travel -->
    <div class="panel-section">
      <div class="panel-title">Travel</div>

      <div class="progress-card">
        <div class="progress-title">National Parks</div>
        <div class="progress-bar"><div id="parksBar" class="progress-fill"></div></div>
        <div class="progress-label"><span id="parksCount">0</span>/63</div>
      </div>

      <div class="progress-card">
        <div class="progress-title">AZA Zoos and Aquariums</div>
        <div class="progress-bar"><div id="zooBar" class="progress-fill"></div></div>
        <div class="progress-label"><span id="zooCount">0</span>/240</div>
      </div>

      <div class="progress-card">
        <div class="progress-title">🏰 Disney Parks</div>
        <div class="progress-bar"><div id="disneyBar" class="progress-fill"></div></div>
        <div class="progress-label"><span id="disneyCount">0</span>/12</div>
      </div>

      <div class="progress-card">
        <div class="progress-title">🎢 Universal Parks</div>
        <div class="progress-bar"><div id="universalBar" class="progress-fill"></div></div>
        <div class="progress-label"><span id="universalCount">0</span>/7</div>
      </div>
    </div>

    <!-- Leagues -->
    <div class="panel-section">
      <div class="panel-title">Leagues Tracker</div>
      <!-- keep your existing league cards unchanged -->
    </div>

    <!-- Filters -->
    <div class="panel-section">
      <div class="panel-title">Filters</div>
      <!-- keep your filters unchanged -->
    </div>

  </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- MarkerCluster JS -->
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<!-- Turf.js -->
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<!-- Map logic -->
<script src="map.js"></script>

</body>
</html>
