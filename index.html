<header>
  <div class="header-left">
    <h1>Blake’s Travel Map</h1>
    <p>Tracking my travels across the USA</p>
  </div>
  <div class="header-right">
    <img src="images/profile.jpg" alt="Blake Whitman">
  </div>
</header>

<button id="panel-toggle">Stats</button>

<div id="map"></div>

<div id="control-panel">
  <div class="panel-section">
    <div class="panel-title">Stats</div>
    <div class="stat"><span id="statesVisited">0</span> States Visited</div>
    <div class="stat"><span id="citiesVisited">0</span> Cities</div>
    <div class="stat"><span id="parksVisited">0</span> Parks</div>
    <div class="stat"><span id="sportsVisited">0</span> Sports Venues</div>
  </div>

  <div class="panel-section">
    <div class="panel-title">Completion</div>

    <div class="progress-card">
      <div class="progress-title">USA States</div>
      <div class="progress-bar"><div id="statesBar" class="progress-fill"></div></div>
      <div class="progress-label"><span id="statesCount">0</span>/50</div>
    </div>

    <div class="progress-card">
      <div class="progress-title">MLB Stadiums</div>
      <div class="progress-bar"><div id="mlbBar" class="progress-fill"></div></div>
      <div class="progress-label"><span id="mlbCount">0</span>/30</div>
    </div>

    <div class="progress-card">
      <div class="progress-title">NFL Stadiums</div>
      <div class="progress-bar"><div id="nflBar" class="progress-fill"></div></div>
      <div class="progress-label"><span id="nflCount">0</span>/32</div>
    </div>

    <div class="progress-card">
      <div class="progress-title">NBA Arenas</div>
      <div class="progress-bar"><div id="nbaBar" class="progress-fill"></div></div>
      <div class="progress-label"><span id="nbaCount">0</span>/30</div>
    </div>

    <div class="progress-card">
      <div class="progress-title">NHL Arenas</div>
      <div class="progress-bar"><div id="nhlBar" class="progress-fill"></div></div>
      <div class="progress-label"><span id="nhlCount">0</span>/32</div>
    </div>
  </div>

  <div class="panel-section">
    <div class="panel-title">Filters</div>
    <label class="filter-pill">
      <input type="checkbox" class="filter" value="city" checked>
      <span>🏙 Cities</span>
    </label>
    <label class="filter-pill">
      <input type="checkbox" class="filter" value="national" checked>
      <span>🌲 Parks</span>
    </label>
    <label class="filter-pill">
      <input type="checkbox" class="filter" value="sports" checked>
      <span>🏟 Sports</span>
    </label>
    <label class="filter-pill">
      <input type="checkbox" class="filter" value="airport" checked>
      <span>✈ Airports</span>
    </label>
  </div>
</div>
