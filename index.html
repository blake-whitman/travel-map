<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blake's Travel Map</title>

<!-- Leaflet CSS -->

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<!-- MarkerCluster CSS -->

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<!-- Your styles -->

<link rel="stylesheet" href="style.css"/>

</head>

<body>

<header>
  <div class="header-left">
    <h1>Blake’s Travel Map</h1>
    <p>Tracking my travels across the USA</p>
  </div>

  <div class="header-right">
    <img src="images/profile.jpg" alt="Blake Whitman">
  </div>
</header>

<section class="stats">

  <div class="stat-card">
    <div class="stat-number" id="statesVisited">0</div>
    <div class="stat-label">States</div>
    <div class="stat-sub" id="statesPercent">0% of USA</div>
  </div>

  <div class="stat-card">
    <div class="stat-number" id="citiesVisited">0</div>
    <div class="stat-label">Cities</div>
  </div>

  <div class="stat-card">
    <div class="stat-number" id="parksVisited">0</div>
    <div class="stat-label">National Parks</div>
  </div>

  <div class="stat-card">
    <div class="stat-number" id="sportsVisited">0</div>
    <div class="stat-label">Sports Venues</div>
  </div>

</section>

<section class="progress-section">

  <div class="progress-card">
    <div class="progress-title">USA States</div>
    <div class="progress-bar">
      <div id="statesBar" class="progress-fill"></div>
    </div>
    <div class="progress-label">
      <span id="statesCount">0</span> / 50
    </div>
  </div>

  <div class="progress-card">
    <div class="progress-title">MLB Stadiums</div>
    <div class="progress-bar">
      <div id="mlbBar" class="progress-fill"></div>
    </div>
    <div class="progress-label">
      <span id="mlbCount">0</span> / 30
    </div>
  </div>

  <div class="progress-card">
    <div class="progress-title">NFL Stadiums</div>
    <div class="progress-bar">
      <div id="nflBar" class="progress-fill"></div>
    </div>
    <div class="progress-label">
      <span id="nflCount">0</span> / 30
    </div>
  </div>

  <div class="progress-card">
    <div class="progress-title">NBA Arenas</div>
    <div class="progress-bar">
      <div id="nbaBar" class="progress-fill"></div>
    </div>
    <div class="progress-label">
      <span id="nbaCount">0</span> / 30
    </div>
  </div>

  <div class="progress-card">
    <div class="progress-title">NHL Arenas</div>
    <div class="progress-bar">
      <div id="nhlBar" class="progress-fill"></div>
    </div>
    <div class="progress-label">
      <span id="nhlCount">0</span> / 32
    </div>
  </div>

</section>

<section class="filters">
  Filter:
  <label><input type="checkbox" class="filter" value="city" checked> Cities</label>
  <label><input type="checkbox" class="filter" value="national" checked> National Parks</label>
  <label><input type="checkbox" class="filter" value="airport" checked> Airports</label>
  <label><input type="checkbox" class="filter" value="sports" checked> Sports</label>
</section>

<div id="map"></div>

<!-- Leaflet JS -->

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- MarkerCluster JS -->

<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<!-- Your map logic -->
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
<script src="map.js"></script>

</body>
</html>
