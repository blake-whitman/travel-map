<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blake's Travel Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="style.css"/>
<link rel="stylesheet"
 href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<link rel="stylesheet"
 href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Blake’s Travel Map</h1>
    <p>Tracking my travels across the USA</p>
  </div>
  <div class="header-right">
    <img src="images/profile.jpg" alt="Blake Whitman">
  </div>
</header>

<section class="stats">
  <div class="stat"><span id="statesVisited">0</span> States Visited</div>
  <div class="stat"><span id="citiesVisited">0</span> Cities Visited</div>
  <div class="stat"><span id="parksVisited">0</span> National Parks</div>
  <div class="stat"><span id="sportsVisited">0</span> Sports Visited</div>
</section>

<section class="filters">
  Filter:
  <label><input type="checkbox" class="filter" value="city" checked> Cities</label>
  <label><input type="checkbox" class="filter" value="national" checked> National Parks</label>
  <label><input type="checkbox" class="filter" value="airport" checked> Airports</label>
  <label><input type="checkbox" class="filter" value="sports" checked> Sports</label>
</section>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="map.js"></script>
</body>
</html>
